name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "artwork/**"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "artwork/**"

env:
  PYTHONPATH: src
  QT_QPA_PLATFORM: offscreen
  GITHUB_CI: "true"
  CONFIG_FILE: "tests/github_ci_config.json"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "True"

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements.txt

      - name: Run Quality Checks
        run: python scripts/run_qc.py --debug

      - name: Upload Quality Check Reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: quality-check-reports
          path: |
            scripts/runqc/reports/
            scripts/runqc/logs/
          retention-days: 14
          if-no-files-found: error

  test:
    needs: code-quality
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            x11-utils \
            libegl1 \
            libopengl0

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Create Test Directories
        run: |
          mkdir -p tests/reports/coverage
          mkdir -p tests/reports/html
          mkdir -p tests/reports/logs

      - name: Run Tests (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pytest tests \
            --config tests/github_ci_config.json \
            --cov=src \
            --cov-report=xml:tests/reports/coverage/coverage.xml \
            --cov-report=html:tests/reports/coverage/html \
            --html=tests/reports/html/report.html \
            --junit-xml=tests/reports/junit.xml \
            -v

      - name: Run Tests (Linux)
        if: runner.os == 'Linux'
        run: |
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          sleep 3
          export DISPLAY=:99
          python -m pytest tests \
            --config tests/github_ci_config.json \
            --cov=src \
            --cov-report=xml:tests/reports/coverage/coverage.xml \
            --cov-report=html:tests/reports/coverage/html \
            --html=tests/reports/html/report.html \
            --junit-xml=tests/reports/junit.xml \
            -v

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./tests/reports/coverage/coverage.xml
          fail_ci_if_error: true
          verbose: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            tests/reports/coverage/
            tests/reports/html/
            tests/reports/logs/
            tests/reports/junit.xml
          retention-days: 14
          if-no-files-found: error

  build:
    needs: test
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable
        run: python scripts/build_executable.py

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: GynTree-Windows
          path: dist/GynTree.exe
          retention-days: 14
